{% if is_trash_view %}
{% include "leads/partials/_lead_grid_permanent_delete_button.html" with lead_id=lead_id %}
{% else %}<button type="button"
  class="lead-card-trash-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200/90 bg-white text-base text-slate-500 shadow-sm transition-all duration-300 hover:border-red-200 hover:bg-red-50/90 hover:text-red-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500/30"
  hx-post="{% url 'move_to_trash_group' pk=lead_id %}"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
  hx-target="#lead-grid-cell-{{ lead_id }}"
  hx-swap="delete swap:300ms"
  hx-indicator="this"
  hx-target-error="#lead-junk-error-{{ lead_id }}"
  onclick="event.stopPropagation()"
  title="Move to trash"
  aria-label="Move lead to trash">
  <span aria-hidden="true">🚫</span>
  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
</button>
{% endif %}
