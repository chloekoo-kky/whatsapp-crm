<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

<script>

  function __htmxCsrfToken() {

    var match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);

    if (match) return decodeURIComponent(match[1]);

    var meta = document.querySelector('meta[name="csrf-token"]');

    return meta ? (meta.getAttribute("content") || "") : "";

  }



  window.__ensureGridHtmxBound = function () {

    if (!window.htmx) return;

    var gridInner = document.getElementById("clinics-grid-inner");

    if (gridInner) window.htmx.process(gridInner);

  };

  window.__undimLeadGridCell = function (leadId) {
    if (leadId == null) return;
    var cell = document.getElementById("lead-grid-cell-" + leadId);
    if (!cell) return;
    cell.classList.remove("lead-card--dequeuing");
    cell.setAttribute("data-whatsapp-status", "pending");
  };



  document.body.addEventListener("htmx:configRequest", function (evt) {

    var token = __htmxCsrfToken();

    if (token) {

      evt.detail.headers["X-CSRFToken"] = token;

    }

  });



  document.body.addEventListener("htmx:afterOnLoad", function (evt) {

    var xhr = evt.detail && evt.detail.xhr;

    var elt = evt.detail && evt.detail.elt;

    if (!xhr || !elt || xhr.status < 200 || xhr.status >= 300) return;

    if (

      elt.classList.contains("lead-card-trash-btn") ||

      elt.classList.contains("lead-join-queue-btn") ||

      elt.classList.contains("lead-dequeue-btn") ||

      elt.classList.contains("lead-force-send-btn")

    ) {

      if (typeof window.refreshSelectAllState === "function") window.refreshSelectAllState();

      if (typeof window.refreshSelectionVisuals === "function") window.refreshSelectionVisuals();

      if (typeof window.refreshSetCategoryButtonState === "function") window.refreshSetCategoryButtonState();

      if (typeof window.refreshBulkAssignGroupButtonState === "function") window.refreshBulkAssignGroupButtonState();

      if (typeof window.applyTableFilter === "function") window.applyTableFilter();

    }

    if (elt.classList.contains("lead-join-queue-btn") && xhr) {
      var triggerHeader = xhr.getResponseHeader("HX-Trigger");
      if (triggerHeader) {
        try {
          var triggers = JSON.parse(triggerHeader);
          if (triggers.leadCardUndim != null && window.__undimLeadGridCell) {
            window.__undimLeadGridCell(triggers.leadCardUndim);
          }
        } catch (parseErr) { /* ignore */ }
      }
    }

    if (elt.classList.contains("lead-force-send-btn") && xhr) {
      var forceTriggerHeader = xhr.getResponseHeader("HX-Trigger");
      if (forceTriggerHeader) {
        try {
          var forceTriggers = JSON.parse(forceTriggerHeader);
          if (forceTriggers.forceSendDuplicatePrompt != null && window.__showForceSendDuplicateDialog) {
            window.__showForceSendDuplicateDialog(forceTriggers.forceSendDuplicatePrompt);
          } else if (forceTriggers.leadCardSink != null && window.__sinkLeadCard) {
            window.__sinkLeadCard(forceTriggers.leadCardSink);
          } else if (forceTriggers.leadCardDispatched != null && window.__applyLeadDispatchedChrome) {
            window.__applyLeadDispatchedChrome(forceTriggers.leadCardDispatched);
          }
        } catch (forceParseErr) { /* ignore */ }
      }
    }

  });

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    var target = evt.detail && evt.detail.target;
    if (!target || !target.id || target.id.indexOf("lead-queue-slot-") !== 0) return;
    if (!target.querySelector(".lead-dequeue-btn, .lead-queue-enqueued-indicator")) return;
    var leadId = target.id.slice("lead-queue-slot-".length);
    window.__undimLeadGridCell(leadId);
  });

  document.body.addEventListener("leadCardUndim", function (evt) {
    var id = evt.detail;
    if (id && typeof id === "object") {
      id = id.leadCardUndim != null ? id.leadCardUndim : id.detail;
    }
    window.__undimLeadGridCell(id);
  });



  document.body.addEventListener("htmx:responseError", function (evt) {

    var elt = evt.detail && evt.detail.elt;

    var status = evt.detail && evt.detail.xhr && evt.detail.xhr.status;

    if (elt) elt.classList.remove("htmx-request");

    console.error("HTMX request failed", status, evt.detail.pathInfo && evt.detail.pathInfo.requestPath);

  });



  document.body.addEventListener("htmx:sendError", function (evt) {

    var elt = evt.detail && evt.detail.elt;

    if (elt) elt.classList.remove("htmx-request");

    console.error("HTMX network error", evt.detail && evt.detail.pathInfo && evt.detail.pathInfo.requestPath);

  });



  document.body.addEventListener("funnelMetricsRefresh", function () {

    if (typeof window.__refreshFunnelMetricsStrip === "function") {

      window.__refreshFunnelMetricsStrip();

    }

  });

  document.body.addEventListener("waRowFlash", function (evt) {

    var id = evt.detail;

    if (id == null) return;

    var row = document.querySelector('tr.clinic-row[data-clinic-id="' + id + '"]');

    if (row) {

      row.classList.add("clinic-row--wa-flash");

      window.setTimeout(function () { row.classList.remove("clinic-row--wa-flash"); }, 2200);

    }

    var card = document.querySelector('.clinic-card[data-clinic-id="' + id + '"]');

    if (card) {

      card.classList.add("clinic-card--wa-flash");

      window.setTimeout(function () { card.classList.remove("clinic-card--wa-flash"); }, 2200);

    }

  });

  window.__htmxTriggerValue = function (detail, key) {
    if (detail == null) return null;
    if (typeof detail === "object") {
      if (key && detail[key] != null) return detail[key];
      if (detail.value != null) return detail.value;
      if (detail.detail != null) return detail.detail;
    }
    return detail;
  };

  window.__applyLeadDispatchedChrome = function (id) {
    if (id == null) return;
    var cell = document.getElementById("lead-grid-cell-" + id);
    if (cell) {
      cell.setAttribute("data-whatsapp-status", "sent");
      cell.setAttribute("data-whatsapp-dispatched", "1");
    }
    var row = document.querySelector('tr.clinic-row[data-clinic-id="' + id + '"]');
    if (row) row.setAttribute("data-whatsapp-dispatched", "1");
    var card = document.querySelector('.clinic-card[data-clinic-id="' + id + '"]');
    if (card) {
      card.setAttribute("data-whatsapp-dispatched", "1");
      card.classList.add("clinic-card--dispatched", "border-2", "border-emerald-400", "hover:border-emerald-500");
      card.classList.remove("border", "border-slate-200/90", "hover:border-slate-300");
    }
  };

  window.__sinkLeadCard = function (id) {
    if (id == null) return;
    window.__applyLeadDispatchedChrome(id);
    var cell = document.getElementById("lead-grid-cell-" + id);
    var grid = document.getElementById("clinics-grid-inner");
    if (cell && grid) {
      cell.classList.add("lead-card--sinking");
      grid.appendChild(cell);
      window.setTimeout(function () { cell.classList.remove("lead-card--sinking"); }, 320);
    }
    var row = document.querySelector('tr.clinic-row[data-clinic-id="' + id + '"]');
    var tbody = document.getElementById("clinics-table-body");
    if (row && tbody) tbody.appendChild(row);
  };

  document.body.addEventListener("leadCardDispatched", function (evt) {
    var id = window.__htmxTriggerValue(evt.detail, "leadCardDispatched");
    window.__applyLeadDispatchedChrome(id);
  });

  document.body.addEventListener("leadCardSink", function (evt) {
    var id = window.__htmxTriggerValue(evt.detail, "leadCardSink");
    window.__sinkLeadCard(id);
  });

  window.__forceSendDuplicatePayload = null;

  window.__showForceSendDuplicateDialog = function (payload) {
    var dialog = document.getElementById("force-send-duplicate-dialog");
    if (!dialog || !payload) return;
    window.__forceSendDuplicatePayload = payload;
    var msg = document.getElementById("force-send-duplicate-message");
    var tpl = payload.templateName || "this template";
    if (msg) {
      msg.textContent = "Template \"" + tpl + "\" was already sent to this lead. Send it again?";
    }
    dialog.showModal();
  };

  window.__submitForceSendDuplicateConfirm = function () {
    var payload = window.__forceSendDuplicatePayload;
    var dialog = document.getElementById("force-send-duplicate-dialog");
    if (!payload || !window.htmx) return;
    var leadId = payload.leadId != null ? payload.leadId : payload.lead_id;
    if (leadId == null) return;
    var urlTemplate = dialog ? dialog.getAttribute("data-url-template") : "";
    if (!urlTemplate) return;
    var url = urlTemplate.replace(/\/0\/?$/, "/" + leadId + "/");
    var confirmBtn = document.getElementById("force-send-duplicate-confirm");
    if (confirmBtn) confirmBtn.disabled = true;
    window.htmx.ajax("POST", url, {
      target: "#lead-bottom-actions-" + leadId,
      swap: "outerHTML",
      values: {
        group_id: payload.groupId || payload.group_id || "",
        confirm_duplicate: "1",
      },
      headers: { "X-CSRFToken": __htmxCsrfToken() },
    }).finally(function () {
      if (confirmBtn) confirmBtn.disabled = false;
      if (dialog) dialog.close();
      window.__forceSendDuplicatePayload = null;
    });
  };

  document.body.addEventListener("forceSendDuplicatePrompt", function (evt) {
    var payload = window.__htmxTriggerValue(evt.detail, "forceSendDuplicatePrompt");
    if (payload && typeof payload === "object") {
      window.__showForceSendDuplicateDialog(payload);
    } else {
      window.__showForceSendDuplicateDialog({ leadId: payload, templateName: "" });
    }
  });

  document.getElementById("force-send-duplicate-cancel")?.addEventListener("click", function () {
    document.getElementById("force-send-duplicate-dialog")?.close();
    window.__forceSendDuplicatePayload = null;
  });

  document.getElementById("force-send-duplicate-confirm")?.addEventListener("click", function () {
    window.__submitForceSendDuplicateConfirm();
  });

  document.getElementById("force-send-duplicate-dialog")?.addEventListener("click", function (e) {
    if (e.target === e.currentTarget) {
      e.currentTarget.close();
      window.__forceSendDuplicatePayload = null;
    }
  });

  window.__chatInboxPollTimer = null;

  window.__stopChatInboxPolling = function () {

    if (window.__chatInboxPollTimer) {

      window.clearInterval(window.__chatInboxPollTimer);

      window.__chatInboxPollTimer = null;

    }

  };

  window.__scrollChatInboxToBottom = function (el) {

    if (!el) return;

    el.scrollTop = el.scrollHeight;

    window.requestAnimationFrame(function () {

      el.scrollTop = el.scrollHeight;

    });

  };

  window.__startChatInboxPolling = function () {

    window.__stopChatInboxPolling();

    var panel = document.querySelector("#chat-modal-container .chat-inbox-messages");

    if (!panel || !window.htmx) return;

    var url = panel.getAttribute("data-chat-poll-url");

    if (!url) return;

    window.__scrollChatInboxToBottom(panel);

    window.setTimeout(function () {

      window.__scrollChatInboxToBottom(panel);

    }, 120);

    window.__chatInboxPollTimer = window.setInterval(function () {

      var root = document.getElementById("chat-modal-container");

      if (!root || !root.innerHTML.trim()) {

        window.__stopChatInboxPolling();

        return;

      }

      var livePanel = root.querySelector(".chat-inbox-messages");

      if (!livePanel) {

        window.__stopChatInboxPolling();

        return;

      }

      window.htmx.ajax("GET", url, { target: livePanel, swap: "innerHTML" });

    }, 3000);

  };

  document.body.addEventListener("keydown", function (evt) {

    if (evt.key !== "Escape") return;

    var chatRoot = document.getElementById("chat-modal-container");

    if (chatRoot && chatRoot.innerHTML.trim()) {

      window.__stopChatInboxPolling();

      chatRoot.innerHTML = "";

    }

  });

  document.body.addEventListener("htmx:afterSwap", function (evt) {

    var target = evt.detail && evt.detail.target;

    if (target && target.id === "chat-modal-container") {

      if (window.__startChatInboxPolling) window.__startChatInboxPolling();

    }

    if (target && target.classList && target.classList.contains("chat-inbox-messages")) {

      window.__scrollChatInboxToBottom(target);

      if (typeof window.__refreshLeadChatIndicators === "function") {
        window.__refreshLeadChatIndicators();
      }

    }

  });



  document.body.addEventListener("leadCardFloat", function (evt) {

    var id = evt.detail;

    if (id == null) return;

    var cell = document.getElementById("lead-grid-cell-" + id);

    var grid = document.getElementById("clinics-grid-inner");

    if (!cell || !grid) return;

    cell.setAttribute("data-whatsapp-status", "idle");

    cell.classList.add("lead-card--floating");

    var firstPending = grid.querySelector('.lead-card-container[data-whatsapp-status="pending"]');

    if (firstPending) {

      grid.insertBefore(cell, firstPending);

    } else {

      grid.insertBefore(cell, grid.firstElementChild);

    }

    window.setTimeout(function () { cell.classList.remove("lead-card--floating"); }, 320);

  });



  if (document.readyState === "loading") {

    document.addEventListener("DOMContentLoaded", window.__ensureGridHtmxBound);

  } else {

    window.__ensureGridHtmxBound();

  }

</script>
