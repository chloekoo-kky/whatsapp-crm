<label class="hunt-option-toggle inline-flex min-h-[2.5rem] w-full cursor-pointer items-center justify-between gap-3 rounded-lg border border-slate-200/90 bg-white px-3.5 py-2 shadow-sm select-none transition hover:border-slate-300/90 hover:bg-slate-50/40 has-[:focus-visible]:ring-2 has-[:focus-visible]:ring-indigo-500/35"{% if toggle_title %} title="{{ toggle_title }}"{% endif %}>
  <span class="text-xs font-semibold text-slate-700">{{ toggle_label }}</span>
  {% if toggle_desc %}
  <span class="sr-only" id="{{ toggle_desc_id }}">{{ toggle_desc }}</span>
  {% endif %}
  <input type="checkbox" id="{{ toggle_id }}" name="{{ toggle_name }}" class="sr-only"{% if toggle_checked %} checked{% endif %}{% if toggle_desc_id %} aria-describedby="{{ toggle_desc_id }}"{% endif %} />
  <span class="hunt-option-switch" aria-hidden="true">
    <span class="hunt-option-switch__thumb"></span>
  </span>
</label>
