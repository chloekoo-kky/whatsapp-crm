<script>
  (function () {
    var THRESHOLD = 72;
    var MAX_PULL = 120;

    function isMobileLayout() {
      return window.matchMedia("(max-width: 1023px)").matches;
    }

    function bindLeadsPullToRefresh() {
      var scroll = document.getElementById("leads-scroll-container");
      var indicator = document.getElementById("leads-ptr-indicator");
      var content = document.getElementById("leads-ptr-content");
      if (!scroll || !indicator || !content || scroll.dataset.ptrBound === "1") return;
      if (!isMobileLayout()) return;
      scroll.dataset.ptrBound = "1";

      var startY = 0;
      var pulling = false;
      var dist = 0;
      var refreshing = false;
      var label = indicator.querySelector(".leads-ptr-text");

      function setLabel(text) {
        if (label) label.textContent = text;
      }

      function setDist(nextDist) {
        dist = Math.max(0, Math.min(nextDist, MAX_PULL));
        content.style.transform = dist > 0 ? "translateY(" + dist + "px)" : "";
        indicator.style.height = dist > 0 ? dist + "px" : "0";
        indicator.style.opacity = dist > 0 ? "1" : "0";
        scroll.classList.toggle("leads-ptr--pulling", pulling && dist > 0);
        scroll.classList.toggle("leads-ptr--ready", dist >= THRESHOLD && !refreshing);
        if (!refreshing) {
          setLabel(dist >= THRESHOLD ? "Release to refresh" : "Pull to refresh");
        }
      }

      function resetPull() {
        pulling = false;
        if (!refreshing) {
          setDist(0);
          content.style.transform = "";
        }
      }

      async function refresh() {
        if (refreshing) return;
        refreshing = true;
        scroll.classList.add("leads-ptr--refreshing");
        scroll.classList.remove("leads-ptr--ready");
        setLabel("Refreshing…");
        setDist(THRESHOLD * 0.55);
        try {
          if (typeof window.__refreshCurrentLeadFolder === "function") {
            await window.__refreshCurrentLeadFolder();
          } else {
            window.location.reload();
          }
          if (typeof window.__refreshFunnelMetricsStrip === "function") {
            await window.__refreshFunnelMetricsStrip();
          }
        } catch (err) {
          console.error(err);
        } finally {
          refreshing = false;
          scroll.classList.remove("leads-ptr--refreshing");
          resetPull();
        }
      }

      scroll.addEventListener(
        "touchstart",
        function (e) {
          if (!isMobileLayout() || refreshing || scroll.scrollTop > 1) return;
          startY = e.touches[0].clientY;
          pulling = true;
        },
        { passive: true }
      );

      scroll.addEventListener(
        "touchmove",
        function (e) {
          if (!pulling || refreshing) return;
          if (scroll.scrollTop > 1) {
            resetPull();
            return;
          }
          var dy = e.touches[0].clientY - startY;
          if (dy > 0) {
            e.preventDefault();
            setDist(dy * 0.45);
          } else {
            resetPull();
          }
        },
        { passive: false }
      );

      scroll.addEventListener("touchend", function () {
        if (!pulling || refreshing) return;
        if (dist >= THRESHOLD) {
          pulling = false;
          refresh();
          return;
        }
        resetPull();
      });

      scroll.addEventListener("touchcancel", function () {
        if (!refreshing) resetPull();
      });
    }

    bindLeadsPullToRefresh();
    window.__bindLeadsPullToRefresh = bindLeadsPullToRefresh;
  })();
</script>
