{% if lead.whatsapp_status == 'pending' %}
<button type="button"
  class="lead-dequeue-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-emerald-200/80 bg-emerald-50/70 text-lg text-emerald-600 shadow-sm transition-all duration-200 hover:scale-105 hover:border-emerald-300 hover:bg-emerald-100/80 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500/35"
  data-dequeue-url="{% url 'dequeue_lead' pk=lead.id %}"
  data-group-id="{{ current_group_id }}"
  data-lead-id="{{ lead.id }}"
  data-queue-view="{% if is_queue_view %}1{% else %}0{% endif %}"
  title="Remove from WhatsApp queue"
  aria-label="Remove from WhatsApp queue">
  <span class="lead-dequeue-icon" aria-hidden="true">✅</span>
  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
</button>
{% elif lead.whatsapp_status == 'processing' %}
<span class="lead-queue-enqueued-indicator inline-flex h-9 w-9 items-center justify-center rounded-lg border border-emerald-200/80 bg-emerald-50/70 text-lg text-emerald-600 shadow-sm"
  title="Sending"
  aria-label="Sending">
  <span aria-hidden="true">✅</span>
</span>
{% else %}
<button type="button"
  class="lead-join-queue-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200/90 bg-white text-base text-slate-500 shadow-sm transition-all duration-200 hover:scale-105 hover:border-sky-200 hover:bg-sky-50/90 hover:text-blue-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-500/35"
  hx-post="{% url 'enqueue_lead' pk=lead.id %}"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
  hx-vals='{"group_id": "{{ current_group_id }}"}'
  hx-target="#lead-queue-slot-{{ lead.id }}"
  hx-swap="innerHTML"
  hx-indicator="this"
  title="Enqueue for WhatsApp outreach"
  aria-label="Enqueue for WhatsApp outreach">
  <span aria-hidden="true">⏳</span>
  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
</button>
{% endif %}
