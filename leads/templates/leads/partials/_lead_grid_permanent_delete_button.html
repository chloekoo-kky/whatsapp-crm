<button type="button"
  class="lead-card-trash-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200/90 bg-white text-base text-slate-500 shadow-sm transition-all duration-300 hover:border-red-200 hover:bg-red-50/90 hover:text-red-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500/30"
  hx-delete="{% url 'delete_lead_permanently' pk=lead_id %}"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
  hx-target="#lead-grid-cell-{{ lead_id }}"
  hx-swap="delete swap:300ms"
  hx-confirm="Are you sure you want to permanently delete this lead from the database?"
  hx-indicator="this"
  hx-target-error="#lead-junk-error-{{ lead_id }}"
  onclick="event.stopPropagation()"
  title="Permanently delete this lead"
  aria-label="Permanently delete lead">
  <span class="lead-card-trash-icon inline-flex" aria-hidden="true">
    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
  </span>
  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
</button>
