<button type="button"

  class="lead-force-send-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200/90 bg-white text-base text-slate-500 shadow-sm transition-all duration-200 hover:scale-110 hover:border-amber-200 hover:bg-amber-50/90 hover:text-amber-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/35"

  hx-post="{% url 'whatsapp_force_send' pk=lead.id %}"

  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'

  hx-vals='{"group_id": "{{ current_group_id }}"}'

  hx-target="#lead-bottom-actions-{{ lead.id }}"
  hx-swap="outerHTML"

  hx-indicator="this"

  title="Send now ({{ force_send_template_name|default:'template' }})"

  aria-label="Send now using {{ force_send_template_name|default:'template' }} template">

  <span aria-hidden="true">⚡</span>

  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-amber-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>

</button>
