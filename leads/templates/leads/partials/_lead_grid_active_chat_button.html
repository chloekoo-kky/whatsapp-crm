{% load clinic_display %}

{% if lead|whatsapp_dispatched %}

<button type="button"

  class="lead-card-active-chat-btn active-chat-badge lead-card-mobile-chat-btn relative inline-flex h-9 w-9 items-center justify-center rounded-lg border border-emerald-200/90 bg-white text-emerald-600 shadow-sm transition-all duration-300 hover:border-emerald-300 hover:bg-emerald-50/90 hover:text-emerald-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500/30"

  hx-get="{% url 'chat_inbox' pk=lead.id %}"

  hx-target="#chat-modal-container"

  hx-swap="innerHTML"

  hx-indicator="this"

  hx-on:click="event.stopPropagation()"

  hx-on::after-settle="if (window.__startChatInboxPolling) window.__startChatInboxPolling()"

  title="Open chat with {{ lead.name|escape }}"

  aria-label="Open chat">

  <span class="lead-card-active-chat-icon inline-flex" aria-hidden="true">

    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>

  </span>

  {% if lead|whatsapp_active_chat %}

  <span class="lead-chat-awaiting-pulse absolute right-1 top-1 flex h-2 w-2" aria-hidden="true">

    <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-500 ring-2 ring-white"></span>

  </span>

  {% endif %}

  <svg class="htmx-indicator absolute h-3.5 w-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>

</button>

{% endif %}
