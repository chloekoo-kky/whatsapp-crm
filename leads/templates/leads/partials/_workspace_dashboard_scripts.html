  <script>
    /* Phone helpers on window: same-origin as server normalize_manual_phone; avoids ReferenceError if main bundle scope is wrong. */
    (function (w) {
      function phoneDigitsOnly(s) {
        return String(s || '').replace(/\D/g, '');
      }
      w.normalizeManualPhoneFromLocal = function (localRaw) {
        var s = String(localRaw || '').trim();
        if (!s) return '';
        var d = phoneDigitsOnly(s);
        if (!d) return '';
        if (d.indexOf('00') === 0) d = d.slice(2);
        if (d.indexOf('6060') === 0 && d.length >= 11) d = '60' + d.slice(4);
        if (d.indexOf('60') === 0 && d.length >= 10) return '+' + d.slice(0, 15);
        if (d.charAt(0) === '0' && d.length >= 9) return '+60' + d.slice(1, 15);
        if (d.length >= 8 && d.length <= 10) return '+60' + d.slice(0, 15);
        if (d.length >= 11) return '+' + d.slice(0, 15);
        return '+60' + d.slice(0, 15);
      };
      w.phoneStoredToLocalField = function (stored) {
        if (!stored || !String(stored).trim()) return '';
        var d = phoneDigitsOnly(stored);
        if (!d) return '';
        if (d.indexOf('00') === 0) d = d.slice(2);
        if (d.indexOf('60') === 0 && d.length > 2) return d.slice(2);
        if (d.charAt(0) === '0' && d.length >= 9) return d.slice(1);
        return d;
      };
    })(window);
  </script>

      function getCookie(name) {
        var v = null;
        if (document.cookie && document.cookie !== '') {
          var parts = document.cookie.split(';');
          for (var i = 0; i < parts.length; i++) {
            var c = parts[i].trim();
            if (c.substring(0, name.length + 1) === name + '=') {
              v = decodeURIComponent(c.substring(name.length + 1));
              break;
            }
          }
        }
        return v;
      }

      /** Prefer csrftoken cookie so the header always matches what Django validates (see Django AJAX CSRF docs). */
      function getCsrfToken() {
        var fromCookie = getCookie('csrftoken');
        if (fromCookie) return fromCookie;
        var m = document.querySelector('meta[name="csrf-token"]');
        return m ? (m.getAttribute('content') || '') : '';
      }

      function dispatchHtmxTriggerHeader(headerValue) {
        if (!headerValue) return;
        try {
          var events = JSON.parse(headerValue);
          Object.keys(events).forEach(function (name) {
            document.body.dispatchEvent(new CustomEvent(name, { detail: events[name] }));
          });
        } catch (err) {
          console.error(err);
        }
      }

      async function handleLeadDequeueClick(btn) {
        if (!btn || btn.classList.contains('is-busy')) return;
        var url = btn.getAttribute('data-dequeue-url');
        var leadId = btn.getAttribute('data-lead-id');
        if (!url || !leadId) return;
        var isQueueView = btn.getAttribute('data-queue-view') === '1';
        btn.classList.add('is-busy');
        btn.disabled = true;
        try {
          var body = new FormData();
          var groupId = btn.getAttribute('data-group-id');
          if (groupId) body.append('group_id', groupId);
          var res = await fetch(url, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCsrfToken() },
            credentials: 'same-origin',
            body: body,
          });
          var html = await res.text();
          if (!res.ok) {
            window.alert('Could not remove this lead from the WhatsApp queue.');
            return;
          }
          dispatchHtmxTriggerHeader(res.headers.get('HX-Trigger'));
          if (isQueueView) {
            var cell = document.getElementById('lead-grid-cell-' + leadId);
            if (cell) {
              cell.classList.add('lead-card--dequeuing');
              cell.setAttribute('data-whatsapp-status', 'idle');
            }
            var slot = document.getElementById('lead-queue-slot-' + leadId);
            if (slot) {
              slot.innerHTML = html;
              if (window.htmx) window.htmx.process(slot);
            }
          } else {
            var slot = document.getElementById('lead-queue-slot-' + leadId);
            if (slot) {
              slot.innerHTML = html;
              if (window.htmx) window.htmx.process(slot);
            }
          }
          if (typeof window.refreshSelectAllState === 'function') window.refreshSelectAllState();
          if (typeof window.refreshSelectionVisuals === 'function') window.refreshSelectionVisuals();
          if (typeof window.refreshSetCategoryButtonState === 'function') window.refreshSetCategoryButtonState();
          if (typeof window.refreshBulkAssignGroupButtonState === 'function') window.refreshBulkAssignGroupButtonState();
          if (typeof window.applyTableFilter === 'function') window.applyTableFilter({ resetPage: false });
        } catch (err) {
          console.error(err);
          window.alert('Network error while removing lead from queue.');
        } finally {
          if (document.body.contains(btn)) {
            btn.classList.remove('is-busy');
            btn.disabled = false;
          }
        }
      }

      var MANUAL_PHONE_MAX = 8;
      var manualPhoneRowTpl = document.getElementById('manual-phone-row-template');

      function syncManualPhoneRemoveVisibility(container) {
        if (!container) return;
        var rows = container.querySelectorAll('.manual-phone-row');
        var multi = rows.length > 1;
        rows.forEach(function (row) {
          var btn = row.querySelector('.manual-phone-remove');
          if (btn) {
            btn.style.visibility = multi ? 'visible' : 'hidden';
            btn.disabled = !multi;
          }
        });
      }

      function appendManualPhoneRow(container, localDigits, skipCapCheck) {
        if (!container || !manualPhoneRowTpl) return;
        if (!skipCapCheck && container.querySelectorAll('.manual-phone-row').length >= MANUAL_PHONE_MAX) return;
        var frag = manualPhoneRowTpl.content.cloneNode(true);
        var inp = frag.querySelector('.manual-phone-local');
        if (inp && localDigits != null && localDigits !== '') inp.value = localDigits;
        container.appendChild(frag);
        syncManualPhoneRemoveVisibility(container);
      }

      function fillManualPhoneList(container, storedPhonesE164) {
        if (!container) return;
        container.innerHTML = '';
        var localList = [];
        if (Array.isArray(storedPhonesE164) && storedPhonesE164.length) {
          storedPhonesE164.forEach(function (s) {
            localList.push(window.phoneStoredToLocalField(s));
          });
        } else {
          localList.push('');
        }
        localList.forEach(function (localVal) {
          appendManualPhoneRow(container, localVal, true);
        });
        if (!container.querySelector('.manual-phone-row')) appendManualPhoneRow(container, '', true);
        syncManualPhoneRemoveVisibility(container);
      }

      function collectManualPhonePayload(container) {
        var out = [];
        if (!container) return out;
        container.querySelectorAll('.manual-phone-local').forEach(function (inp) {
          var n = window.normalizeManualPhoneFromLocal(inp.value || '');
          if (n && out.indexOf(n) === -1) out.push(n);
        });
        return out;
      }

      function setLimit(limit, syncButtons) {
        const n = parseInt(limit, 10);
        const v = (isNaN(n) ? defaultLimit : n).toString();
        if (huntLimitInput) huntLimitInput.value = v;
        if (syncButtons) {
          limitButtons.forEach(function (btn) {
            const active = btn.getAttribute('data-limit') === v;
            btn.classList.toggle('limit-btn--active', active);
            btn.classList.toggle('bg-indigo-600', active);
            btn.classList.toggle('text-white', active);
            btn.classList.toggle('shadow-sm', active);
            btn.classList.toggle('text-slate-600', !active);
            btn.classList.toggle('hover:bg-slate-50', !active);
            btn.classList.toggle('hover:text-slate-900', !active);
          });
        }
      }

      limitButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          setLimit(btn.getAttribute('data-limit'), true);
        });

      setLimit(huntLimitInput ? huntLimitInput.value : defaultLimit, true);

      function bindHuntOptionToggle(el, storageKey) {
        if (!el) return;
        try {
          var stored = localStorage.getItem(storageKey);
          if (stored !== null) {
            el.checked = stored === "1" || stored === "true";
          }
        } catch (e) { /* ignore */ }
        el.addEventListener('change', function () {
          try {
            localStorage.setItem(storageKey, el.checked ? "1" : "0");
          } catch (e) { /* ignore */ }
        });
      }

      const requireWebsiteToggle = document.getElementById('hunt-require-website');
      bindHuntOptionToggle(requireWebsiteToggle, REQUIRE_WEBSITE_KEY);

      const chatIndicatorPollToggle = document.getElementById('chat-indicator-poll-toggle');

      function isChatIndicatorPollingEnabled() {
        if (chatIndicatorPollToggle) return chatIndicatorPollToggle.checked;
        try {
          var stored = localStorage.getItem(CHAT_INDICATOR_POLL_KEY);
          if (stored !== null) return stored === '1' || stored === 'true';
        } catch (e) { /* ignore */ }
        return true;

      function isLeadsDashboardVisible() {

      function setLeadVipStarVisual(btn, on) {
        if (!btn) return;
        btn.setAttribute('data-vip', on ? 'true' : 'false');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');

      function syncRowDataSearch(row, category, isChain, isVeryImportant) {
        const base = (row.getAttribute('data-search-base') || '').trim();
        var t = (row.getAttribute('data-category') || '').trim();
        if (category !== undefined && category !== null) {
          t = String(category).trim();
          row.setAttribute('data-category', t);
        }
        var chain = row.getAttribute('data-is-chain') === '1';
        if (isChain !== undefined && isChain !== null) {
          chain = !!isChain;
          row.setAttribute('data-is-chain', chain ? '1' : '0');
        }
        var vip = row.getAttribute('data-very-important') === '1';
        if (isVeryImportant !== undefined && isVeryImportant !== null) {
          vip = !!isVeryImportant;
          row.setAttribute('data-very-important', vip ? '1' : '0');
        }
        const bits = [base, t];
        if (chain) bits.push('chain');
        if (vip) bits.push('important');
        row.setAttribute('data-search', bits.join(' ').replace(/\s+/g, ' ').trim());
      }

      function escapeHtml(s) {
        if (s == null) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
      }

      function renderSourceLineText(searchState, searchCity, shopKeyword, searchQuery) {
        const parts = [
          (searchState || '').trim(),
          (searchCity || '').trim(),
          (shopKeyword || '').trim(),
          (searchQuery || '').trim(),
        ].filter(function (s) { return s.length > 0; });
        if (!parts.length) return '<span class="text-slate-400">—</span>';
        return parts.map(escapeHtml).join(' <span class="text-slate-400">/</span> ');
      }

      function renderWebsiteLineHtml(website) {
        const w = (website || '').trim();
        if (!w) return '';
        return (
          '<a href="' +
          escapeAttr(w) +
          '" class="break-all text-indigo-600 underline decoration-slate-300 decoration-1 underline-offset-2 transition hover:text-indigo-500" target="_blank" rel="noopener" title="' +
          escapeAttr(w) +
          '">' +
          escapeHtml(w) +
          '</a>'
        );
      }

      function setRowWhatsappDraft(row, draft) {
        if (!row) return;
        var store = row.querySelector('.whatsapp-draft-store');
        var btn = row.querySelector('.whatsapp-copy-btn');
        var t = draft != null ? String(draft) : '';
        if (store) store.textContent = t;
        if (btn) {
          var has = t.trim().length > 0;
          btn.disabled = !has;
          btn.title = has ? 'Copy WhatsApp draft to clipboard' : 'No draft yet — add one in Edit';
        }
      }

      let clinicSaveStatusTimer = null;
      function showClinicSaveSuccess(name) {
        const el = document.getElementById('clinic-save-status');

        const label = (name != null && String(name).trim()) ? String(name).trim() : 'Clinic';
        el.textContent = 'Saved — ' + label + ' updated.';
        el.classList.remove('hidden');
        if (clinicSaveStatusTimer) clearTimeout(clinicSaveStatusTimer);
        clinicSaveStatusTimer = setTimeout(function () {
          el.classList.add('hidden');
          el.textContent = '';
          clinicSaveStatusTimer = null;
        }, 4200);
      }

        const sel = '.clinic-row[data-clinic-id="' + clinicId + '"]';

          row.classList.add('clinic-row--updated');

      function rebindLeadCardHtmx(leadId) {
        if (!window.htmx || leadId == null) return;
        var cell = document.getElementById('lead-grid-cell-' + leadId);
        if (cell) window.htmx.process(cell);
        document.querySelectorAll('tr.clinic-row[data-clinic-id="' + leadId + '"]').forEach(function (tr) {
          window.htmx.process(tr);
        });
      }

      function applyClinicEditToDom(d) {
        if (!d || !d.ok || d.id == null) return;
        const id = d.id;
        var phonesSearch = '';
        if (Array.isArray(d.phone_numbers) && d.phone_numbers.length) {
          phonesSearch = d.phone_numbers.join(' ');
        } else if (d.phone_number) {
          phonesSearch = String(d.phone_number);
        }
        const baseStr = [d.name, d.address, phonesSearch, d.website, d.shop_keyword, d.search_state, d.search_city, d.search_query]
          .join(' ')
          .replace(/\s+/g, ' ')
          .trim();

        document.querySelectorAll('.clinic-row[data-clinic-id="' + id + '"]').forEach(function (row) {
          row.setAttribute('data-search-base', baseStr);
          row.setAttribute('data-is-chain', d.is_chain ? '1' : '0');
          if (d.search_state != null) {
            row.setAttribute('data-sort-state', String(d.search_state || '').toLowerCase());
          }
          const typeCell = row.querySelector('.clinic-type-cell');
          if (typeCell && d.type_html) typeCell.innerHTML = d.type_html;
          if (d.is_very_important !== undefined) {
            row.querySelectorAll('.lead-vip-star-btn').forEach(function (b) {
              setLeadVipStarVisual(b, !!d.is_very_important);
            });
          }
          syncRowDataSearch(
            row,
            d.category || d.clinic_type,
            d.is_chain,
            d.is_very_important
          );

          const nameInner = row.querySelector('.clinic-name-cell-inner');
          if (nameInner && d.name_cell_html) nameInner.innerHTML = d.name_cell_html;

          const sourceLine = row.querySelector('.clinic-source-line');
          if (sourceLine) sourceLine.innerHTML = renderSourceLineText(d.search_state, d.search_city, d.shop_keyword, d.search_query);

          const branchesLine = row.querySelector('.clinic-branches-line');
          if (branchesLine) {
            if (d.branches_line_html) {
              branchesLine.innerHTML = d.branches_line_html;
              branchesLine.classList.remove('hidden');
            } else {
              branchesLine.innerHTML = '';
              branchesLine.classList.add('hidden');
            }
          }

          const addrEl = row.querySelector('.clinic-address-inner');
          if (addrEl) {
            const a = d.address != null ? String(d.address).trim() : '';
            const nm = d.name != null ? String(d.name).trim() : '';
            addrEl.textContent = a || '—';
            addrEl.setAttribute('data-clinic-name', nm);
            addrEl.setAttribute('data-address-copy', a);
            const hasAddrCopy = !!(nm || a);
            addrEl.setAttribute('title', hasAddrCopy ? 'Click to copy name & address' : 'Nothing to copy');
            if (addrEl.tagName === 'BUTTON') addrEl.disabled = !hasAddrCopy;
          }

          const webLine = row.querySelector('.clinic-website-line');
          if (webLine) {
            const wh = renderWebsiteLineHtml(d.website);
            if (wh) {
              webLine.innerHTML = wh;
              webLine.classList.remove('hidden');
            } else {
              webLine.innerHTML = '';
              webLine.classList.add('hidden');
            }
          }

          row.querySelectorAll('td.clinic-phone-cell').forEach(function (td) {
            if (d.phone_td_inner_list) td.innerHTML = d.phone_td_inner_list;
          });
          row.querySelectorAll('.clinic-phone-slot').forEach(function (slot) {
            if (d.phone_slot_inner_grid) slot.outerHTML = d.phone_slot_inner_grid;
          });

          if (d.whatsapp_status != null) {
            row.setAttribute('data-whatsapp-status', String(d.whatsapp_status));
            var gridCell = document.getElementById('lead-grid-cell-' + id);
            if (gridCell) gridCell.setAttribute('data-whatsapp-status', String(d.whatsapp_status));
          }
          if (d.whatsapp_dispatched != null) {
            var dispatched = d.whatsapp_dispatched ? '1' : '0';
            row.setAttribute('data-whatsapp-dispatched', dispatched);
            var gridCellDisp = document.getElementById('lead-grid-cell-' + id);
            if (gridCellDisp) gridCellDisp.setAttribute('data-whatsapp-dispatched', dispatched);
            if (row.classList.contains('clinic-card')) {
              row.classList.toggle('clinic-card--dispatched', !!d.whatsapp_dispatched);
              row.classList.toggle('border-2', !!d.whatsapp_dispatched);
              row.classList.toggle('border-emerald-400', !!d.whatsapp_dispatched);
              row.classList.toggle('hover:border-emerald-500', !!d.whatsapp_dispatched);
              row.classList.toggle('border', !d.whatsapp_dispatched);
              row.classList.toggle('border-slate-200/90', !d.whatsapp_dispatched);
              row.classList.toggle('hover:border-slate-300', !d.whatsapp_dispatched);
            }
          }
          if (d.grid_bottom_actions_html) {
            var bottomActions = document.getElementById('lead-bottom-actions-' + id);
            if (bottomActions) bottomActions.outerHTML = d.grid_bottom_actions_html;
          }

          var copyPhone = '';
          if (Array.isArray(d.phone_numbers) && d.phone_numbers.length) {
            copyPhone = d.phone_numbers.join(' ; ');
          } else if (d.phone_number != null) {
            copyPhone = String(d.phone_number);
          }
          row.querySelectorAll('.lead-card-copy-details-btn').forEach(function (btn) {
            btn.setAttribute('data-copy-name', d.name != null ? String(d.name) : '');
            btn.setAttribute('data-copy-address', d.address != null ? String(d.address) : '');

      const selectAll = document.getElementById('select-all-clinics');

      function readLeadsPerPage() {
        var allowed = { 24: true, 48: true, 96: true };
        try {
          var stored = parseInt(localStorage.getItem(LEADS_PER_PAGE_KEY) || '48', 10);
          if (allowed[stored]) return stored;
        } catch (e) { /* ignore */ }
        return 48;
      }

      function syncLeadsPerPageSelect() {
        var sel = document.getElementById('leads-per-page-select');
        if (!sel) return;
        var perPage = String(readLeadsPerPage());
        if (sel.value !== perPage) sel.value = perPage;

      function getFilteredClinicRowsInOrder() {
        var tbody = document.getElementById('clinics-table-body');

      function updateLeadPaginationControls(totalFiltered, totalPages) {
        var statusEl = document.getElementById('leads-page-status');
        var prevBtn = document.getElementById('leads-page-prev');
        var nextBtn = document.getElementById('leads-page-next');
        var controls = document.getElementById('leads-pagination-controls');
        if (statusEl) {
          statusEl.textContent = totalFiltered
            ? String(currentLeadPage) + ' / ' + String(totalPages)
            : '0 / 0';
        }
        if (prevBtn) prevBtn.disabled = currentLeadPage <= 1 || totalFiltered === 0;
        if (nextBtn) nextBtn.disabled = currentLeadPage >= totalPages || totalFiltered === 0;
        if (controls) {
          controls.classList.toggle('opacity-60', totalFiltered === 0);
        }
      }

      function applyLeadPagination(resetPage) {
        syncLeadsPerPageSelect();
        var perPage = readLeadsPerPage();
        if (resetPage) currentLeadPage = 1;
        var rows = getFilteredClinicRowsInOrder();
        var totalFiltered = rows.length;
        var totalPages = Math.max(1, Math.ceil(totalFiltered / perPage) || 1);
        if (currentLeadPage > totalPages) currentLeadPage = totalPages;
        if (currentLeadPage < 1) currentLeadPage = 1;
        var start = (currentLeadPage - 1) * perPage;
        var end = start + perPage;
        var visibleIds = Object.create(null);
        rows.forEach(function (row, idx) {
          if (idx >= start && idx < end) {
            var id = row.getAttribute('data-clinic-id');
            if (id) visibleIds[id] = true;
          }
        });
        document.querySelectorAll('.clinic-row').forEach(function (row) {
          var id = row.getAttribute('data-clinic-id');
          var filterHidden = row.classList.contains('hidden');
          if (filterHidden) {
            row.classList.remove('lead-page-hidden');
            return;
          }
          row.classList.toggle('lead-page-hidden', !visibleIds[id]);
        });
        document.querySelectorAll('.lead-card-container').forEach(function (cell) {
          var row = cell.querySelector('.clinic-row');
          if (!row) return;
          var id = row.getAttribute('data-clinic-id');
          var filterHidden = cell.classList.contains('hidden');
          if (filterHidden) {
            cell.classList.remove('lead-page-hidden');
            return;
          }
          cell.classList.toggle('lead-page-hidden', !visibleIds[id]);
        });
        updateLeadPaginationControls(totalFiltered, totalPages);
        clearSelectionsForHiddenRows();
        refreshSelectAllState();
        refreshSelectionVisuals();
        refreshGridCardsDraggable();
      }

      function goToLeadPage(page) {
        var next = parseInt(page, 10);
        if (!next || next < 1) return;
        currentLeadPage = next;
        applyLeadPagination(false);
      }

      window.__refreshFunnelMetricsStrip = async function () {
        try {
          var gid = typeof currentLeadGroupTabId !== 'undefined' && currentLeadGroupTabId != null
            ? String(currentLeadGroupTabId)
            : 'uncategorized';
          var data = await fetchLeadsTableFragment(gid);

          if (data && data.group_counts) updateLeadGroupTabCounts(data.group_counts);
        } catch (e) {
          console.error(e);
        }
      };

      var folderTotalPipelineCount = 0;

      function countUniqueLeadIdsFromRows(rows) {
        var seen = Object.create(null);
        (rows || []).forEach(function (row) {
          var id = row.getAttribute('data-clinic-id');
          if (id) seen[id] = true;
        });
        return Object.keys(seen).length;

      function isLeadTableFilterActive() {
        var si = document.getElementById('table-search');
        if (si && si.value.trim()) return true;
        var vip = document.getElementById('filter-very-important-only');
        if (vip && vip.getAttribute('aria-pressed') === 'true') return true;
        var sent = document.getElementById('filter-sent-message-only');
        return !!(sent && sent.getAttribute('aria-pressed') === 'true');
      }

      function getFolderLeadCount() {
        var domCount = countUniqueLeadIdsFromRows(getAllClinicRowsInActiveView());
        return Math.max(domCount, folderTotalPipelineCount);
      }

      function refreshFilteredLeadCount() {
        var totalEl = document.getElementById('funnel-metric-total');
        var labelEl = document.getElementById('funnel-metric-total-label');
        var hintEl = document.getElementById('funnel-metric-total-filtered-hint');
        var folderEl = document.getElementById('funnel-metric-total-folder');
        if (!totalEl || !labelEl) return;

        var folderCount = getFolderLeadCount();

        if (!isLeadTableFilterActive()) {
          labelEl.textContent = 'Total Pipeline';
          totalEl.textContent = String(folderCount);
          if (hintEl) {
            hintEl.classList.add('hidden');
            hintEl.setAttribute('aria-hidden', 'true');
          }

        }

        var allRows = getAllClinicRowsInActiveView();
        var visibleRows = allRows.filter(function (r) { return !r.classList.contains('hidden'); });
        labelEl.textContent = 'Filtered count';
        totalEl.textContent = String(countUniqueLeadIdsFromRows(visibleRows));
        if (hintEl && folderEl) {
          folderEl.textContent = String(folderCount);
          hintEl.classList.remove('hidden');
          hintEl.setAttribute('aria-hidden', 'false');
        }

      function updateFunnelMetricsStrip(metrics) {
        if (!metrics || typeof metrics !== 'object') return;
        if (metrics.total_pipeline != null) {
          folderTotalPipelineCount = Number(metrics.total_pipeline) || 0;
        }
        var map = {
          in_queue: 'funnel-metric-queue',
          outbound_sent: 'funnel-metric-sent',
          live_responses: 'funnel-metric-responses',
        };
        Object.keys(map).forEach(function (key) {
          var el = document.getElementById(map[key]);
          if (el && metrics[key] != null) el.textContent = String(metrics[key]);
        });
        refreshFilteredLeadCount();

      function updateLeadGroupTabCounts(counts) {
        if (!counts || typeof counts !== 'object') return;
        document
          .querySelectorAll('#lead-group-tabs .lead-group-tab[data-group-id]')
          .forEach(function (tab) {
            var id = tab.getAttribute('data-group-id') || '';
            if (!Object.prototype.hasOwnProperty.call(counts, id)) return;
            var badge = tab.querySelector('.lead-group-count');
            if (!badge) return;
            var n = counts[id];
            badge.textContent = String(n);
            badge.title = n + ' lead(s) in this group';
          });

      var leadChatIndicatorPollTimer = null;
      var leadChatIndicatorSnapshot = '';

      function createLeadChatAwaitingPulse() {
        var wrap = document.createElement('span');
        wrap.className = 'lead-chat-awaiting-pulse absolute right-1 top-1 flex h-2 w-2';
        wrap.setAttribute('aria-hidden', 'true');
        var dot = document.createElement('span');
        dot.className = 'relative inline-flex h-2 w-2 rounded-full bg-emerald-500 ring-2 ring-white';
        dot.setAttribute('aria-hidden', 'true');
        wrap.appendChild(dot);
        return wrap;
      }

      function updateActiveChatCountBadge(count) {
        var badge = document.getElementById('active-chat-count-badge');
        if (!badge) return;
        var n = Number(count) || 0;
        badge.textContent = String(n);
        badge.setAttribute('aria-label', n + ' active chats');

        badge.classList.toggle('hidden', n === 0);
      }

      function setLeadCardAwaitingPulse(leadId, awaiting) {
        var cell = document.getElementById('lead-grid-cell-' + leadId);
        if (!cell) return false;
        var wants = awaiting ? '1' : '0';
        if (cell.getAttribute('data-awaiting-client-reply') === wants) return false;
        cell.setAttribute('data-awaiting-client-reply', wants);
        var btn = cell.querySelector('.lead-card-active-chat-btn');
        if (!btn) return true;
        var pulse = btn.querySelector('.lead-chat-awaiting-pulse');
        if (awaiting) {
          if (!pulse) btn.appendChild(createLeadChatAwaitingPulse());
        } else if (pulse) {
          pulse.remove();
        }
        return false;
      }

      function leadChatIndicatorSnapshotFromMap(leads) {
        var keys = Object.keys(leads || {}).sort();
        var parts = [];
        keys.forEach(function (id) {
          var row = leads[id] || {};
          parts.push(
            id + ':' + (row.awaiting ? '1' : '0') + ':' + (row.dispatched ? '1' : '0')
          );
        });
        return parts.join('|');
      }

      async function silentRefreshCurrentLeadGrid() {
        var data = await fetchLeadsTableFragment(currentLeadGroupTabId);
        if (!data || !data.ok) return;
        var tb = document.getElementById('clinics-table-body');
        var gridInner = document.getElementById('clinics-grid-inner');
        if (tb) tb.innerHTML = data.tbody_html;
        if (gridInner) gridInner.innerHTML = data.grid_html;
        if (data.funnel_metrics) updateFunnelMetricsStrip(data.funnel_metrics);
        if (data.group_counts) updateLeadGroupTabCounts(data.group_counts);
        syncLeadsAfterGroupFragmentSwap();
        leadChatIndicatorSnapshot = leadChatIndicatorSnapshotFromMap(
          (await fetchLeadChatIndicators())?.leads || {}
        );
      }

      async function fetchLeadChatIndicators() {
        var u = new URL(getLeadChatIndicatorsUrl, window.location.origin);
        var gid = normalizeLeadGroupTabId(currentLeadGroupTabId);
        u.searchParams.set('group_id', gid === 'uncategorized' ? 'uncategorized' : String(gid));
        if (activeSearchRecordId != null) u.searchParams.set('search_record', String(activeSearchRecordId));
        var res = await fetch(u.toString(), { headers: { Accept: 'application/json' }, credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      }

      window.__refreshLeadChatIndicators = async function () {
        var gridInner = document.getElementById('clinics-grid-inner');
        if (!gridInner || !document.getElementById('clinics-panel')) return;
        try {
          var data = await fetchLeadChatIndicators();
          if (!data || !data.ok) return;
          if (data.funnel_metrics) updateFunnelMetricsStrip(data.funnel_metrics);
          if (data.group_counts) updateLeadGroupTabCounts(data.group_counts);
          if (data.active_chat_count != null) updateActiveChatCountBadge(data.active_chat_count);
          var snapshot = leadChatIndicatorSnapshotFromMap(data.leads || {});
          if (snapshot !== leadChatIndicatorSnapshot) {
            var apiLeadIds = Object.keys(data.leads || {});
            var domLeadIds = Array.prototype.slice.call(
              document.querySelectorAll('#clinics-grid-inner .lead-card-container')
            ).map(function (cell) {
              return (cell.id || '').replace('lead-grid-cell-', '');
            }).filter(Boolean);

            var rosterChanged = apiLeadIds.length !== domLeadIds.length;
            if (!rosterChanged) {
              for (var i = 0; i < apiLeadIds.length; i += 1) {
                if (domLeadIds.indexOf(apiLeadIds[i]) === -1) {
                  rosterChanged = true;
                  break;
                }
              }
            }
            if (!rosterChanged) {
              for (var j = 0; j < domLeadIds.length; j += 1) {
                if (!data.leads || !data.leads[domLeadIds[j]]) {
                  rosterChanged = true;
                  break;
                }
              }
            }

            if (rosterChanged) {
              await silentRefreshCurrentLeadGrid();
            } else {
              apiLeadIds.forEach(function (leadId) {
                var row = data.leads[leadId] || {};
                setLeadCardAwaitingPulse(leadId, !!row.awaiting);
                var cell = document.getElementById('lead-grid-cell-' + leadId);
                if (cell) {
                  cell.setAttribute('data-whatsapp-dispatched', row.dispatched ? '1' : '0');
                }
                document.querySelectorAll('.clinic-row[data-clinic-id="' + leadId + '"]').forEach(function (el) {
                  el.setAttribute('data-whatsapp-dispatched', row.dispatched ? '1' : '0');
                });
              });
              leadChatIndicatorSnapshot = snapshot;
            }
          }
        } catch (e) {
          console.error(e);
        }
      };

      window.__startLeadChatIndicatorPolling = function () {
        window.__stopLeadChatIndicatorPolling();
        if (!shouldPollLeadChatIndicators()) return;
        window.__refreshLeadChatIndicators();
        leadChatIndicatorPollTimer = window.setInterval(function () {
          if (!shouldPollLeadChatIndicators()) {
            window.__stopLeadChatIndicatorPolling();
            return;
          }
          window.__refreshLeadChatIndicators();
        }, CHAT_INDICATOR_POLL_MS);
      };

      window.__syncLeadChatIndicatorPolling = function () {
        if (shouldPollLeadChatIndicators()) {
          window.__startLeadChatIndicatorPolling();
        } else {
          window.__stopLeadChatIndicatorPolling();
        }
      };

      window.__stopLeadChatIndicatorPolling = function () {
        if (leadChatIndicatorPollTimer) {
          window.clearInterval(leadChatIndicatorPollTimer);
          leadChatIndicatorPollTimer = null;
        }
      };

      function refreshBulkActionDock() {
        var dock = document.getElementById('bulk-action-dock');
        if (!dock) return;
        var n = getUniqueSelectedLeadIds().length;
        var countEl = document.getElementById('bulk-action-dock-count');
        if (countEl) {
          countEl.textContent = n + (n === 1 ? ' selected' : ' selected');
        }

        // Only ever show the dock on the Leads workspace panel.
        var dashPanel = document.getElementById('workspace-panel-dashboard');
        var onLeadsPage = !!dashPanel && !dashPanel.hasAttribute('hidden');

        var onQueueTab = queueGroupTabId &&
          String(currentLeadGroupTabId) === String(queueGroupTabId);
        var onTrashTab = trashGroupTabId &&
          String(currentLeadGroupTabId) === String(trashGroupTabId);

        // Queue → "Choose batch" + "Remove from queue"; Trash → no bulk action; else → "Push to queue".
        var showQueueBtn = onLeadsPage && !onQueueTab && !onTrashTab;
        var showBatchBtn = onLeadsPage && onQueueTab;
        var showDequeueBtn = onLeadsPage && onQueueTab;

        var visible = n > 0 && onLeadsPage && (showQueueBtn || showBatchBtn || showDequeueBtn);
        dock.hidden = !visible;
        dock.setAttribute('aria-hidden', visible ? 'false' : 'true');
        dock.classList.toggle('bulk-action-dock--visible', visible);

        var queueBtn = document.getElementById('bulk-wa-queue-btn');
        var batchBtn = document.getElementById('bulk-choose-batch-btn');
        var dequeueBtn = document.getElementById('bulk-dequeue-btn');
        // NOTE: the Tailwind `inline-flex` utility on these buttons overrides the
        // `[hidden]` UA rule, so toggling the `hidden` property alone won't hide
        // them. Force visibility via inline `display` (highest specificity).
        if (queueBtn) {
          queueBtn.hidden = !showQueueBtn;
          queueBtn.style.display = showQueueBtn ? '' : 'none';
        }
        if (batchBtn) {
          batchBtn.hidden = !showBatchBtn;
          batchBtn.style.display = showBatchBtn ? '' : 'none';
        }
        if (dequeueBtn) {
          dequeueBtn.hidden = !showDequeueBtn;
          dequeueBtn.style.display = showDequeueBtn ? '' : 'none';
        }
      }

      async function bulkDequeueSelectedFromQueue() {
        var ids = getUniqueSelectedLeadIds();
        if (!ids.length) return;
        if (!window.confirm('Remove ' + ids.length + ' selected lead(s) from the WhatsApp queue?')) return;
        var btn = document.getElementById('bulk-dequeue-btn');
        if (btn) btn.disabled = true;
        try {
          var res = await fetch(bulkDequeueUrl, {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCsrfToken(),
            },
            body: JSON.stringify({ ids: ids }),
          });
          var data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error((data.detail && String(data.detail)) || ('HTTP ' + res.status));
          }
          var statusEl = document.getElementById('clinic-save-status');
          if (statusEl) {
            var msg = 'Removed ' + (data.updated || 0) + ' lead(s) from the queue.';
            if (data.skipped) msg += ' ' + data.skipped + ' skipped (not pending).';
            statusEl.textContent = msg;
            statusEl.classList.remove('hidden');
            window.setTimeout(function () { statusEl.classList.add('hidden'); }, 3200);
          }
          if (selectAll) selectAll.checked = false;
          await switchLeadGroupTab(currentLeadGroupTabId, { force: true, skipHistory: true });
        } catch (err) {
          console.error(err);
          window.alert((err && err.message) || 'Could not remove selected leads from the queue.');
        } finally {
          if (btn) btn.disabled = false;
        }
      }

      function showChooseBatchError(msg) {

      function toggleChooseBatchNewFields() {
        var sel = document.getElementById('choose-batch-select');

      async function populateChooseBatchDialog() {
        var sel = document.getElementById('choose-batch-select');
        var tplSel = document.getElementById('choose-batch-template');
        if (sel) sel.innerHTML = '<option value="">Loading…</option>';
        try {
          var res = await fetch(whatsappBatchesJsonUrl, { credentials: 'same-origin' });
          var data = await res.json();
          if (!res.ok || !data.ok) throw new Error('HTTP ' + res.status);
          if (sel) {
            sel.innerHTML = '';
            (data.batches || []).forEach(function (b) {
              var opt = document.createElement('option');
              opt.value = String(b.id);
              opt.textContent = b.label;
              sel.appendChild(opt);
            });
            var newOpt = document.createElement('option');
            newOpt.value = 'new';
            newOpt.textContent = '+ New batch…';
            sel.appendChild(newOpt);
            if (!data.batches || !data.batches.length) sel.value = 'new';
          }
          if (tplSel) {
            tplSel.innerHTML = '';
            (data.templates || []).forEach(function (pair) {
              var opt = document.createElement('option');
              opt.value = pair[0];
              opt.textContent = pair[1];
              if (pair[0] === data.default_template) opt.selected = true;
              tplSel.appendChild(opt);
            });
          }
          toggleChooseBatchNewFields();
        } catch (e) {
          showChooseBatchError('Could not load batches.');
        }
      }

      function openChooseBatchDialog() {
        var ids = getUniqueSelectedLeadIds();
        if (!ids.length || !chooseBatchDialog) return;
        clearChooseBatchError();
        var countEl = document.getElementById('choose-batch-count');
        if (countEl) countEl.textContent = String(ids.length);
        chooseBatchDialog.showModal();
        populateChooseBatchDialog();
      }
      function closeChooseBatchDialog() {
        if (chooseBatchDialog) chooseBatchDialog.close();
      }

      async function submitChooseBatch() {
        var ids = getUniqueSelectedLeadIds();
        if (!ids.length) return;
        var sel = document.getElementById('choose-batch-select');
        var submitBtn = document.getElementById('choose-batch-submit');
        clearChooseBatchError();
        var payload = { ids: ids, batch_id: sel ? sel.value : '' };
        if (!payload.batch_id) {
          showChooseBatchError('Pick a batch or create a new one.');
          return;
        }
        if (payload.batch_id === 'new') {
          payload.new_batch = {
            outbound_template_name: (document.getElementById('choose-batch-template') || {}).value || '',
            scheduled_date: (document.getElementById('choose-batch-date') || {}).value || '',
            scheduled_time: (document.getElementById('choose-batch-time') || {}).value || '',
          };
        }
        if (submitBtn) submitBtn.disabled = true;
        try {
          var res = await fetch(bulkAssignBatchUrl, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
            body: JSON.stringify(payload),
          });
          var data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error((data.detail && String(data.detail)) || ('HTTP ' + res.status));
          }
          var assigned = data.updated || 0;
          var skipped = data.skipped || 0;
          var msg = 'Assigned ' + assigned + ' lead' + (assigned === 1 ? '' : 's') + ' to the batch.';
          if (skipped > 0) {
            msg += ' ' + skipped + ' already in a pending batch — skipped.';
          }
          var statusEl = document.getElementById('clinic-save-status');
          if (statusEl) {
            var warnClasses = ['bg-amber-50', 'text-amber-900', 'ring-amber-200/90'];
            var okClasses = ['bg-emerald-50', 'text-emerald-900', 'ring-emerald-200/90'];
            statusEl.classList.remove.apply(statusEl.classList, skipped > 0 ? okClasses : warnClasses);
            statusEl.classList.add.apply(statusEl.classList, skipped > 0 ? warnClasses : okClasses);
            statusEl.textContent = msg;
            statusEl.classList.remove('hidden');
            window.setTimeout(function () { statusEl.classList.add('hidden'); }, skipped > 0 ? 5200 : 3200);
          }
          closeChooseBatchDialog();
          if (selectAll) selectAll.checked = false;
          await switchLeadGroupTab(currentLeadGroupTabId, { force: true, skipHistory: true });
        } catch (err) {
          showChooseBatchError((err && err.message) || 'Could not assign leads.');
        } finally {
          if (submitBtn) submitBtn.disabled = false;
        }
      }

      function bindSelectableSurface(root) {
        if (!root) return;
        // Stop shift+click from highlighting card text as a side-effect.
        root.addEventListener('mousedown', function (e) {
          if (!e.shiftKey) return;
          const row = e.target.closest('.clinic-row--selectable');
          if (!row || !root.contains(row)) return;
          if (e.target.closest('a, button, input, textarea, select, label')) return;
          e.preventDefault();
        });
        root.addEventListener('click', function (e) {
          const row = e.target.closest('.clinic-row--selectable');
          if (!row || !root.contains(row)) return;
          if (e.target.closest('a, button, input, textarea, select, label')) return;
          const cb = row.querySelector('.clinic-select-cb');
          if (!cb) return;

          // Shift+click selects the contiguous range from the anchor to here.
          if (e.shiftKey && selectionAnchorId != null) {
            const rows = getVisibleClinicRows(root);
            const clickedIdx = rows.indexOf(row);
            let anchorIdx = -1;
            for (let i = 0; i < rows.length; i++) {
              const rcb = rows[i].querySelector('.clinic-select-cb');
              if (rcb && rcb.value === selectionAnchorId) { anchorIdx = i; break; }
            }
            if (anchorIdx >= 0 && clickedIdx >= 0) {
              const newState = !cb.checked;
              const start = Math.min(anchorIdx, clickedIdx);
              const end = Math.max(anchorIdx, clickedIdx);
              const seen = Object.create(null);
              for (let i = start; i <= end; i++) {
                const rcb = rows[i].querySelector('.clinic-select-cb');
                if (!rcb || seen[rcb.value]) continue;
                seen[rcb.value] = true;
                setLeadCheckboxSelected(rcb.value, newState);
              }
              selectionAnchorId = cb.value;
              if (window.getSelection) { try { window.getSelection().removeAllRanges(); } catch (err) {} }
              refreshSelectAllState();
              refreshSelectionVisuals();
              return;
            }
          }

          cb.checked = !cb.checked;
          selectionAnchorId = cb.value;
          cb.dispatchEvent(new Event('change', { bubbles: true }));
        });
      }

      function compareLeadRowsForSort(a, b) {
        var desc = leadSortMode.endsWith('-desc');
        var field = leadSortMode.split('-')[0];
        var av;
        var bv;
        if (field === 'created') {
          av = parseFloat(a.getAttribute('data-sort-created') || '0') || 0;
          bv = parseFloat(b.getAttribute('data-sort-created') || '0') || 0;
        } else if (field === 'state') {
          av = (a.getAttribute('data-sort-state') || '').toLowerCase();
          bv = (b.getAttribute('data-sort-state') || '').toLowerCase();
        } else {
          av = (a.getAttribute('data-sort-name') || '').toLowerCase();
          bv = (b.getAttribute('data-sort-name') || '').toLowerCase();
        }
        var cmp = 0;
        if (field === 'created') cmp = av - bv;
        else if (av < bv) cmp = -1;
        else if (av > bv) cmp = 1;
        if (cmp === 0) {
          var aid = parseInt(a.getAttribute('data-clinic-id') || '0', 10) || 0;
          var bid = parseInt(b.getAttribute('data-clinic-id') || '0', 10) || 0;
          cmp = aid - bid;
        }
        return desc ? -cmp : cmp;
      }

      const LEAD_FILTER_TAGS_KEY = 'clinic_crm_lead_filter_tags';
      const LEAD_FILTER_TAG_MAX = 24;
      const LEAD_FILTER_TAG_LEN_MAX = 80;

      function loadLeadFilterTags() {
        try {
          var raw = localStorage.getItem(LEAD_FILTER_TAGS_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          var out = [];
          var seen = Object.create(null);
          parsed.forEach(function (item) {
            var text = String(item || '').trim().slice(0, LEAD_FILTER_TAG_LEN_MAX);
            if (!text || seen[text]) return;
            seen[text] = true;
            out.push(text);
          });
          return out.slice(0, LEAD_FILTER_TAG_MAX);
        } catch (e) {
          return [];
        }
      }

      function saveLeadFilterTags(tags) {
        try {
          localStorage.setItem(LEAD_FILTER_TAGS_KEY, JSON.stringify(tags.slice(0, LEAD_FILTER_TAG_MAX)));
        } catch (e) { /* ignore */ }
      }

      function escapeLeadFilterTagHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function renderLeadFilterTags() {

        var si = document.getElementById('table-search');
        var current = si ? si.value.trim() : '';
        list.innerHTML = tags.map(function (tag) {
          var active = current && tag === current;
          return (
            '<span class="lead-filter-tag' + (active ? ' lead-filter-tag--active' : '') + '" data-tag="' + escapeLeadFilterTagHtml(tag) + '" role="listitem">' +
              '<button type="button" class="lead-filter-tag-apply" aria-pressed="' + (active ? 'true' : 'false') + '" title="Apply filter: ' + escapeLeadFilterTagHtml(tag) + '">' +

        var reqId = ++globalSearchRequestId;
        if (!globalSearchActive) tabBeforeGlobalSearch = currentLeadGroupTabId;

        leadGroupTabBusy = true;
        try {
          var data = await fetchLeadsTableFragment(null, { globalSearch: true, q: q });
          if (reqId !== globalSearchRequestId) return;
          if (!data.ok) throw new Error((data.detail && String(data.detail)) || 'Bad response');
          applyLeadsTableFragment(data);
          globalSearchActive = true;
          globalSearchQuery = q;
          updateGlobalSearchBanner({
            count: data.global_search_count,
            truncated: data.global_search_truncated,

          syncLeadsAfterGlobalSearchSwap();

      (function bindLeadGroupTabDragDrop() {
        var wrap = document.getElementById('lead-group-tabs');
        if (!wrap) return;
        var dragTabEl = null;

        function enforceTabAfterUncategorized() {
          var unc = wrap.querySelector('.lead-group-tab[data-group-id="uncategorized"]');
          if (!unc || !dragTabEl) return;
          var uncIdx = Array.prototype.indexOf.call(wrap.children, unc);
          var dragIdx = Array.prototype.indexOf.call(wrap.children, dragTabEl);
          if (dragIdx !== -1 && dragIdx < uncIdx) {
            wrap.insertBefore(dragTabEl, unc.nextElementSibling);
          }
        }

        function placeDragTabByPointer(clientX) {
          var newBtn = document.getElementById('lead-group-new-btn');
          var unc = wrap.querySelector('.lead-group-tab[data-group-id="uncategorized"]');
          var list = wrap.querySelectorAll('.lead-group-tab--draggable');
          if (!list.length) return;
          var firstOther = null;
          for (var j = 0; j < list.length; j++) {
            if (list[j] !== dragTabEl) {
              firstOther = list[j];
              break;
            }
          }
          if (firstOther) {
            var r0 = firstOther.getBoundingClientRect();
            if (clientX < r0.left + r0.width / 2) {
              wrap.insertBefore(dragTabEl, firstOther);
              return;
            }
          }
          for (var i = 0; i < list.length; i++) {
            var btn = list[i];
            if (btn === dragTabEl) continue;
            var rect = btn.getBoundingClientRect();
            if (clientX < rect.left + rect.width / 2) {
              wrap.insertBefore(dragTabEl, btn);
              return;
            }
          }
          if (newBtn) wrap.insertBefore(dragTabEl, newBtn);
          else if (unc) {
            var ref = unc.nextElementSibling;
            while (ref && ref === dragTabEl) ref = ref.nextElementSibling;
            if (ref) wrap.insertBefore(dragTabEl, ref);
          }
        }

        wrap.addEventListener('dragstart', function (e) {
          var t = e.target.closest('.lead-group-tab--draggable');
          if (!t || !wrap.contains(t)) return;
          dragTabEl = t;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', t.getAttribute('data-group-id') || '');
          t.classList.add('lead-group-tab--dragging');
        });
        wrap.addEventListener('dragend', function () {
          if (dragTabEl) dragTabEl.classList.remove('lead-group-tab--dragging');
          dragTabEl = null;
        });
        wrap.addEventListener('dragover', function (e) {
          if (!dragTabEl) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';

          var newBtn = document.getElementById('lead-group-new-btn');
          var unc = wrap.querySelector('.lead-group-tab[data-group-id="uncategorized"]');

          if (newBtn && (e.target === newBtn || newBtn.contains(e.target))) {
            wrap.insertBefore(dragTabEl, newBtn);
            enforceTabAfterUncategorized();
            return;
          }

          var t = e.target.closest('.lead-group-tab[data-group-id]');
          if (t && wrap.contains(t) && t !== dragTabEl) {
            if (t.getAttribute('data-group-id') === 'uncategorized' && unc) {
              var refU = unc.nextElementSibling;
              while (refU && refU === dragTabEl) refU = refU.nextElementSibling;
              if (refU) wrap.insertBefore(dragTabEl, refU);
              else if (newBtn) wrap.insertBefore(dragTabEl, newBtn);
              enforceTabAfterUncategorized();
              return;
            }
            if (t.classList.contains('lead-group-tab--draggable')) {
              var rect = t.getBoundingClientRect();
              var before = e.clientX < rect.left + rect.width / 2;
              if (before) {
                wrap.insertBefore(dragTabEl, t);
              } else {
                var nextEl = t.nextElementSibling;
                while (nextEl && nextEl !== newBtn && nextEl.classList && !nextEl.classList.contains('lead-group-tab--draggable')) {
                  nextEl = nextEl.nextElementSibling;
                }
                if (!nextEl || nextEl === newBtn) wrap.insertBefore(dragTabEl, newBtn);
                else wrap.insertBefore(dragTabEl, nextEl);
              }
            }
          } else {
            placeDragTabByPointer(e.clientX);
          }
          enforceTabAfterUncategorized();
        });
        wrap.addEventListener('drop', function (e) {
          e.preventDefault();
          var ids = [];
          wrap.querySelectorAll('.lead-group-tab--draggable').forEach(function (btn) {
            var id = parseInt(btn.getAttribute('data-group-id'), 10);
            if (!isNaN(id)) ids.push(id);
          });
          if (!ids.length) return;
          fetch(reorderLeadGroupsUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
            credentials: 'same-origin',
            body: JSON.stringify({ order: ids }),
          })
            .then(function (res) {
              return res.json().then(function (data) {
                return { res: res, data: data };
              });
            })
            .then(function (o) {
              if (!o.res.ok) {
                window.alert(typeof o.data.detail === 'string' ? o.data.detail : 'Could not save tab order.');
                window.location.reload();
              }
            })
            .catch(function () {
              window.alert('Could not save tab order.');
              window.location.reload();
            });
        });
      })();

      function positionLeadGroupMoveMenu(anchor) {
        var menu = document.getElementById('lead-group-move-menu');
        if (!menu || !anchor) return;
        menu.classList.remove('hidden');
        menu.setAttribute('aria-hidden', 'false');
        var mw = menu.offsetWidth;
        var mh = menu.offsetHeight;
        var r = anchor.getBoundingClientRect();
        var left = r.left + r.width / 2 - mw / 2;
        var top = r.bottom + 6;
        left = Math.max(8, Math.min(left, window.innerWidth - mw - 8));
        if (top + mh > window.innerHeight - 8) top = Math.max(8, r.top - mh - 6);
        menu.style.left = left + 'px';
        menu.style.top = top + 'px';

      });

      const bulkManualDialog = document.getElementById('bulk-manual-dialog');
      const bulkManualForm = document.getElementById('bulk-manual-form');
      const bulkManualErr = document.getElementById('bulk-manual-error');
      const bulkManualCount = document.getElementById('bulk-manual-count');
      const bulkManualSubmit = document.getElementById('bulk-manual-submit');
      const bulkManualSubmitLabel = document.getElementById('bulk-manual-submit-label');
      const bulkManualSpinner = document.getElementById('bulk-manual-spinner');

      function closeBulkManualDialog() {
        if (bulkManualDialog) bulkManualDialog.close();
      }

      function clearBulkManualErr() {
        if (!bulkManualErr) return;
        bulkManualErr.classList.add('hidden');
        bulkManualErr.textContent = '';
      }

      document.getElementById('bulk-manual-open')?.addEventListener('click', function () {
        const ids = getUniqueSelectedLeadIds();
        if (ids.length < 1) return;
        clearBulkManualErr();
        if (bulkManualCount) {
          bulkManualCount.classList.remove('text-amber-800', 'font-medium');
          const n = ids.length;
          bulkManualCount.textContent =
            n === 1 ? '1 lead selected.' : n + ' leads selected.';
        }
        bulkManualDialog?.showModal();
      });

      document.getElementById('bulk-manual-close-x')?.addEventListener('click', closeBulkManualDialog);
      document.getElementById('bulk-manual-cancel')?.addEventListener('click', closeBulkManualDialog);
      bulkManualDialog?.addEventListener('click', function (e) {
        if (e.target === bulkManualDialog) closeBulkManualDialog();
      });

      bulkManualForm?.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearBulkManualErr();
        const ids = getUniqueSelectedLeadIds().map(function (v) {
          return parseInt(v, 10);
        }).filter(function (n) { return !isNaN(n); });
        if (!ids.length) {
          if (bulkManualErr) {
            bulkManualErr.textContent = 'No rows selected.';
            bulkManualErr.classList.remove('hidden');
          }
          return;
        }
        const category = document.getElementById('bulk-manual-category').value;
        if (bulkManualSubmit) bulkManualSubmit.disabled = true;
        if (bulkManualSpinner) bulkManualSpinner.classList.remove('hidden');
        if (bulkManualSubmitLabel) bulkManualSubmitLabel.textContent = 'Applying…';
        try {
          const res = await fetch(bulkManualUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCsrfToken(),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ ids: ids, category: category }),
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            if (bulkManualErr) {
              bulkManualErr.textContent = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail || res.statusText);
              bulkManualErr.classList.remove('hidden');
            }
            return;
          }
          closeBulkManualDialog();
          window.location.reload();
        } catch (err) {
          if (bulkManualErr) {
            bulkManualErr.textContent = 'Network error: ' + err;
            bulkManualErr.classList.remove('hidden');
          }
        } finally {
          if (bulkManualSubmit) bulkManualSubmit.disabled = false;
          if (bulkManualSpinner) bulkManualSpinner.classList.add('hidden');
          if (bulkManualSubmitLabel) bulkManualSubmitLabel.textContent = 'Apply to selected';
        }
      });

      window.__dashboardOnWorkspaceShown = function () {
        initClinicViewModeFromStorage();
        syncLeadSortSelect();
        applyLeadSort();
        if (typeof window.__ensureGridHtmxBound === 'function') window.__ensureGridHtmxBound();
        if (typeof window.__syncLeadChatIndicatorPolling === 'function') {
          window.__syncLeadChatIndicatorPolling();
        }
      };
      window.__dashboardOnWorkspaceShown();

      const huntForm = document.getElementById('hunt-form');
      const huntStatus = document.getElementById('hunt-status');
      const huntBtn = document.getElementById('hunt-btn');
      const huntBtnLabel = document.getElementById('hunt-btn-label');
      const huntSpinner = document.getElementById('hunt-spinner');

      async function runHunt() {
        huntStatus.textContent = '';
        huntBtn.disabled = true;
        huntSpinner.classList.remove('hidden');
        const requireWebsiteEl = document.getElementById('hunt-require-website');
        const require_website = !!(requireWebsiteEl && requireWebsiteEl.checked);
        huntBtnLabel.textContent = 'Scraping…';

        const city = document.getElementById('city').value.trim();
        const stateEl = document.getElementById('hunt-state');
        const state = stateEl ? stateEl.value.trim() : '';
        const countryEl = document.getElementById('hunt-country');
        const country = countryEl ? countryEl.value.trim() : '';
        const query = document.getElementById('query').value.trim();
        const shopKeywordEl = document.getElementById('hunt-shop-keyword');
        const shop_keyword = shopKeywordEl ? shopKeywordEl.value.trim() : '';
        const exclude_keywords = loadHuntExcludeKeywords();
        const limitRaw = huntLimitInput ? huntLimitInput.value : String(defaultLimit);
        const limit = parseInt(limitRaw, 10) || defaultLimit;
        const qs = new URLSearchParams({ limit: String(limit) });
        const url = huntApiPath + (huntApiPath.indexOf('?') >= 0 ? '&' : '?') + qs.toString();

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCsrfToken(),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ city, state, country, query, shop_keyword, require_website, exclude_keywords }),
          });
          const data = await res.json().catch(function () { return {}; });

          if (!res.ok) {
            const detail = data.detail || data.message || res.statusText;
            huntStatus.textContent = 'Error: ' + (typeof detail === 'string' ? detail : JSON.stringify(detail));
            huntStatus.classList.add('text-red-600');
            return;
          }

          huntStatus.classList.remove('text-red-600');
          huntStatus.textContent = data.message || ('Created ' + data.created + ', skipped ' + data.skipped_existing + '.');
          if (data.errors && data.errors.length) {
            huntStatus.textContent += ' Notes: ' + data.errors.join(' ');
          }
          if (data.enrich_errors && data.enrich_errors.length) {
            huntStatus.textContent += ' Enrich warnings: ' + data.enrich_errors.length + ' issue(s).';
          }
          activeSearchRecordId = null;
          replaceDashboardUrlForCurrentTab('replace');
          await switchLeadGroupTab(currentLeadGroupTabId, { force: true, skipHistory: true });
        } catch (err) {
          huntStatus.classList.add('text-red-600');
          huntStatus.textContent = 'Network error: ' + err;
        } finally {
          huntBtn.disabled = false;
          huntSpinner.classList.add('hidden');
          huntBtnLabel.textContent = 'Run hunt';
        }
      }

      if (huntForm) {
        huntForm.addEventListener('submit', function (e) {
          e.preventDefault();
          runHunt();
        });
      }

      const STATE_CITY_SUGGESTIONS = {
        'Johor': ['Johor Bahru', 'Iskandar Puteri', 'Batu Pahat', 'Muar', 'Kluang', 'Skudai', 'Pasir Gudang', 'Segamat'],
        'Kedah': ['Alor Setar', 'Sungai Petani', 'Kulim', 'Jitra', 'Langkawi', 'Gurun'],
        'Kelantan': ['Kota Bharu', 'Pasir Mas', 'Tanah Merah', 'Tumpat', 'Gua Musang'],
        'Kuala Lumpur': ['Bukit Bintang', 'Cheras', 'Kepong', 'Setapak', 'Bangsar', 'Mont Kiara', 'Sentul', 'Wangsa Maju'],
        'Labuan': ['Victoria', 'Labuan Town'],
        'Melaka': ['Melaka City', 'Ayer Keroh', 'Alor Gajah', 'Jasin', 'Batu Berendam'],
        'Negeri Sembilan': ['Seremban', 'Port Dickson', 'Nilai', 'Bahau', 'Tampin'],
        'Pahang': ['Kuantan', 'Temerloh', 'Bentong', 'Raub', 'Cameron Highlands', 'Pekan'],
        'Penang': ['George Town', 'Bayan Lepas', 'Butterworth', 'Bukit Mertajam', 'Seberang Jaya', 'Tanjung Tokong'],
        'Perak': ['Ipoh', 'Taiping', 'Teluk Intan', 'Sitiawan', 'Kampar', 'Batu Gajah', 'Lumut'],
        'Perlis': ['Kangar', 'Arau', 'Padang Besar'],
        'Putrajaya': ['Putrajaya'],
        'Sabah': ['Kota Kinabalu', 'Sandakan', 'Tawau', 'Lahad Datu', 'Keningau', 'Penampang'],
        'Sarawak': ['Kuching', 'Miri', 'Sibu', 'Bintulu', 'Samarahan', 'Sri Aman'],
        'Selangor': ['Shah Alam', 'Petaling Jaya', 'Subang Jaya', 'Klang', 'Kajang', 'Puchong', 'Ampang', 'Cyberjaya', 'Rawang', 'Cheras'],
        'Terengganu': ['Kuala Terengganu', 'Kemaman', 'Dungun', 'Chukai', 'Marang'],
      };

      const citySuggestBtn = document.getElementById('hunt-city-suggest');
      const cityInput = document.getElementById('city');
      const stateSelect = document.getElementById('hunt-state');
      let citySuggestIndex = 0;
      let citySuggestState = stateSelect ? stateSelect.value : '';

      if (citySuggestBtn && cityInput && stateSelect) {
        stateSelect.addEventListener('change', function () {
          citySuggestIndex = 0;
          citySuggestState = stateSelect.value;
        });
        citySuggestBtn.addEventListener('click', function () {
          const state = stateSelect.value;
          const options = STATE_CITY_SUGGESTIONS[state] || [];
          if (!options.length) return;
          if (state !== citySuggestState) {
            citySuggestState = state;
            citySuggestIndex = 0;
          }
          cityInput.value = options[citySuggestIndex % options.length];
          citySuggestIndex += 1;
          cityInput.dispatchEvent(new Event('input', { bubbles: true }));
          cityInput.focus();
        });
      }

      window.applyTableFilter = applyTableFilter;
      window.refreshSelectAllState = refreshSelectAllState;
      window.refreshSelectionVisuals = refreshSelectionVisuals;

      (function initFolderTotalPipelineCount() {
        var totalEl = document.getElementById('funnel-metric-total');
        if (totalEl) {
          var parsed = parseInt(String(totalEl.textContent || '').trim(), 10);
          if (!isNaN(parsed)) folderTotalPipelineCount = parsed;
        }
        refreshFilteredLeadCount();
      })();
    })();
  </script>
