<section id="force-send-template-settings" class="rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm"{% if oob %} hx-swap-oob="true"{% endif %}>
  <div class="mb-4">
    <h2 class="text-sm font-semibold text-slate-900">Send now template</h2>
    <p class="mt-1 max-w-2xl text-xs text-slate-500">
      Choose which YCloud-approved Meta template the <span class="font-semibold text-slate-700">⚡ Send now</span> button uses on group folder cards. Saved automatically when you change the selection.
    </p>
  </div>

  <div class="min-w-0">
    <label for="force-send-template-select" class="text-xs font-bold uppercase tracking-wide text-slate-500">Template for ⚡ Send now</label>
    <select
      id="force-send-template-select"
      name="force_send_template_name"
      class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-mono text-slate-800 shadow-sm outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/15"
      hx-post="{% url 'save_force_send_template' %}"
      hx-trigger="change"
      hx-target="#wa-config-toast-slot"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      hx-include="this">
      {% for value, label in meta_template_choices %}
      <option value="{{ value }}"{% if config.force_send_template_name == value or not config.force_send_template_name and config.outbound_template_name == value %} selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <dl class="mt-4 grid gap-3 rounded-xl border border-slate-200/80 bg-slate-50/70 px-4 py-3 sm:grid-cols-2">
    <div>
      <dt class="text-[10px] font-bold uppercase tracking-wide text-slate-500">Active send-now template</dt>
      <dd class="mt-1 font-mono text-sm font-semibold text-slate-900">{{ force_send_template_name }}</dd>
    </div>
    <div>
      <dt class="text-[10px] font-bold uppercase tracking-wide text-slate-500">Preview</dt>
      <dd class="mt-1 text-sm leading-snug text-slate-700">{{ force_send_template_preview_body|truncatechars:120 }}</dd>
    </div>
  </dl>
</section>
